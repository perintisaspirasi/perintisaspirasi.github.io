<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Salary Management | Pusat Tuisyen Perintis Aspirasi</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f7fc; color: #1a2c3e; }
        
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a5f7a 0%, #0d3b4f 100%);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .login-card {
            background: white; max-width: 420px; width: 90%; padding: 2.5rem;
            border-radius: 32px; text-align: center;
        }
        .login-card img { width: 80px; margin-bottom: 1rem; }
        .login-card input {
            width: 100%; padding: 14px 18px; border: 2px solid #e0eef5;
            border-radius: 48px; margin-bottom: 1.2rem; outline: none; font-size: 1rem;
        }
        .login-card input:focus { border-color: #2c7da0; }
        .login-card button {
            background: #2c7da0; color: white; border: none; padding: 12px 28px;
            border-radius: 48px; font-weight: 600; cursor: pointer; width: 100%;
        }
        .login-error { color: #d9534f; margin-top: 0.8rem; }
        
        .app { display: none; min-height: 100vh; }
        .sidebar {
            position: fixed; left: 0; top: 0; width: 260px; height: 100%;
            background: white; box-shadow: 2px 0 20px rgba(0,0,0,0.05);
            z-index: 1000; transition: all 0.3s ease; display: flex; flex-direction: column;
        }
        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed .sidebar-logo h2,
        .sidebar.collapsed .nav-item span,
        .sidebar.collapsed .sidebar-footer span { display: none; }
        .sidebar.collapsed .nav-item { justify-content: center; }
        .sidebar-toggle {
            position: absolute; right: -12px; top: 20px; background: #2c7da0;
            color: white; width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.7rem; z-index: 1001;
        }
        .sidebar-logo {
            padding: 1.5rem; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #e4edf2;
        }
        .sidebar-logo img { width: 40px; height: 40px; border-radius: 10px; }
        .sidebar-logo h2 { font-size: 1rem; font-weight: 600; color: #1a5f7a; }
        .nav-menu { flex: 1; padding: 1.5rem 1rem; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            margin-bottom: 8px; border-radius: 12px; color: #4a6f8a;
            cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .nav-item:hover { background: #e8f4f8; color: #2c7da0; }
        .nav-item.active { background: #2c7da0; color: white; }
        .sidebar-footer { padding: 1rem; border-top: 1px solid #e4edf2; }
        
        .main-content {
            margin-left: 260px; transition: all 0.3s ease; padding: 1.5rem 2rem;
        }
        .main-content.expanded { margin-left: 80px; }
        
        .search-section {
            background: white; border-radius: 24px; padding: 1.5rem;
            margin-bottom: 1.5rem; border: 1px solid #e4edf2;
        }
        .search-box { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .search-box input {
            flex: 1; padding: 12px 18px; border: 2px solid #e0eef5;
            border-radius: 48px; outline: none; font-size: 0.95rem;
        }
        .search-box input:focus { border-color: #2c7da0; }
        .search-btn, .reset-btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-btn {
            background: #2c7da0;
            color: white;
            border: none;
        }
        .reset-btn {
            background: #e8f4f8;
            color: #2c7da0;
            border: 1px solid #cde5ef;
        }
        
        /* Card with internal scroll */
        .card {
            background: white;
            border-radius: 24px;
            border: 1px solid #e4edf2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .card-header {
            padding: 1.5rem 1.5rem 0 1.5rem;
        }
        .card-header h3 {
            color: #1a5f7a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-body-scroll {
            padding: 1rem 1.5rem 1.5rem 1.5rem;
            max-height: 550px;
            overflow-y: auto;
        }
        /* Custom scrollbar */
        .card-body-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .card-body-scroll::-webkit-scrollbar-track {
            background: #eef3f7;
            border-radius: 10px;
        }
        .card-body-scroll::-webkit-scrollbar-thumb {
            background: #2c7da0;
            border-radius: 10px;
        }
        
        .teacher-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .teacher-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem;
            border: 1px solid #e4edf2;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        .teacher-item:hover {
            background: #f0f9ff;
            border-color: #2c7da0;
            transform: translateX(4px);
        }
        .teacher-info {
            flex: 1;
        }
        .teacher-name {
            font-weight: 700;
            font-size: 1rem;
            color: #1a5f7a;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .teacher-subjects {
            font-size: 0.75rem;
            color: #6b8ba0;
            margin-top: 4px;
        }
        .teacher-arrow {
            color: #2c7da0;
            font-size: 1.2rem;
        }
        .status-badge {
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .status-badge.parttime {
            background: #fff3e0;
            color: #e67e22;
        }
        .status-badge.fulltime {
            background: #e0f3e8;
            color: #2cae6c;
        }
        .status-badge.tuition {
            background: #e8f4f8;
            color: #2c7da0;
        }
        .status-badge.not-set {
            background: #eef3f7;
            color: #8ba9c0;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 2rem;
            color: #8ba9c0;
        }
        .error-message {
            text-align: center;
            padding: 2rem;
            color: #d9534f;
        }
        
        /* Bank account formatting */
        .bank-account-formatted {
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-container {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: modalSlideIn 0.3s ease;
        }
        .modal-container::-webkit-scrollbar {
            width: 6px;
        }
        .modal-container::-webkit-scrollbar-track {
            background: #eef3f7;
            border-radius: 10px;
        }
        .modal-container::-webkit-scrollbar-thumb {
            background: #2c7da0;
            border-radius: 10px;
        }
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #e4edf2;
            background: #f8fbfd;
            border-radius: 32px 32px 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .modal-header h2 {
            color: #1a5f7a;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #8ba9c0;
            transition: 0.2s;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-modal:hover {
            background: #eef3f7;
            color: #c33;
        }
        .modal-body {
            padding: 1.5rem;
        }
        
        .employment-type {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0eef5;
            border-radius: 40px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s;
        }
        .type-btn.active {
            background: #2c7da0;
            color: white;
            border-color: #2c7da0;
        }
        .type-btn:hover:not(.active) {
            background: #e8f4f8;
            border-color: #2c7da0;
        }
        
        .salary-section {
            display: none;
            animation: fadeIn 0.2s ease;
        }
        .salary-section.active-section {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #6b8ba0;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0eef5;
            border-radius: 30px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        input:focus, select:focus { border-color: #2c7da0; box-shadow: 0 0 0 2px rgba(44,125,160,0.1); }
        input:disabled {
            background: #f5f7f9;
            color: #8ba9c0;
        }
        
        .work-period {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .work-period input {
            flex: 1;
            min-width: 100px;
        }
        .work-period button {
            background: #fee;
            color: #c33;
            padding: 8px 12px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .add-period-btn {
            background: #e8f4f8;
            color: #2c7da0;
            border: 1px solid #cde5ef;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        
        .deduction-item {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .deduction-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .deduction-item input[type="number"] {
            width: 120px;
        }
        
        .subject-salary-item {
            background: #f8fbfd;
            border-radius: 16px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid #2c7da0;
        }
        .subject-name {
            font-weight: 700;
            color: #1a5f7a;
        }
        
        .total-salary {
            background: linear-gradient(135deg, #2c7da0, #1a5f7a);
            color: white;
            padding: 1rem;
            border-radius: 20px;
            margin-top: 1.5rem;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .save-btn {
            background: #2cae6c;
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 1.5rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .save-btn:hover {
            background: #229954;
            transform: translateY(-1px);
        }
        
        .adjustment-hint {
            font-size: 0.7rem;
            color: #8ba9c0;
            margin-top: 4px;
        }
        
        .salary-updated {
            font-size: 0.7rem;
            color: #2cae6c;
            text-align: center;
            margin-top: 8px;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .main-content { margin-left: 80px; padding: 1rem; }
            .work-period { flex-direction: column; }
            .work-period input { width: 100%; }
            .deduction-item { flex-direction: column; align-items: stretch; }
            .teacher-name { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <img src="icon.png" alt="Logo">
            <h3>Salary Management</h3>
            <input type="password" id="loginPassword" placeholder="Enter Password">
            <button id="loginBtn">Access Portal</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <div class="app" id="mainApp">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
            <div class="sidebar-logo"><img src="icon.png" alt="Logo"><h2>Perintis Aspirasi</h2></div>
            <div class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
                <a href="teachermanage.html" class="nav-item"><i class="fas fa-chalkboard-user"></i><span>Teacher Manage</span></a>
                <a href="studentmanage.html" class="nav-item"><i class="fas fa-user-graduate"></i><span>Student Manage</span></a>
                <a href="package.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Package Manage</span></a>
                <a href="invoice.html" class="nav-item"><i class="fas fa-file-invoice"></i><span>Invoice</span></a>
                <a href="salarymanage.html" class="nav-item active"><i class="fas fa-money-bill-wave"></i><span>Salary</span></a>
            </div>
            <div class="sidebar-footer"><div class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Log Out</span></div></div>
        </div>

        <div class="main-content" id="mainContent">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search" style="color:#8ba9c0;"></i>
                    <input type="text" id="searchTeacherInput" placeholder="Search by teacher name or subject...">
                    <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i> Search</button>
                    <button id="resetSearchBtn" class="reset-btn"><i class="fas fa-undo-alt"></i> Reset</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-chalkboard-user"></i> Teachers</h3>
                </div>
                <div class="card-body-scroll" id="teacherListContainer">
                    <div id="teacherList" class="teacher-list">
                        <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading teachers...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Salary Profile Modal -->
    <div id="salaryModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2><i class="fas fa-calculator"></i> <span id="modalTeacherName">Salary Profile</span></h2>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="salaryModalBody">
                <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkfEdLDlHW7DvGxLpbDY7Us2nb3j7oTjQ",
            authDomain: "perintisaspirasi.firebaseapp.com",
            projectId: "perintisaspirasi",
            storageBucket: "perintisaspirasi.firebasestorage.app",
            messagingSenderId: "293094185092",
            appId: "1:293094185092:web:ac2b5712db54480c3ccad1",
            measurementId: "G-9ZSWKEZJVT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Auth
        const loginOverlay = document.getElementById('loginOverlay');
        const mainApp = document.getElementById('mainApp');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');

        function checkLogin() {
            if (sessionStorage.getItem('tutor_auth') === '0919') {
                loginOverlay.style.display = 'none';
                mainApp.style.display = 'block';
                loadAllTeachers();
            } else {
                loginOverlay.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        }

        loginBtn.addEventListener('click', () => {
            if (loginPassword.value === '0919') {
                sessionStorage.setItem('tutor_auth', '0919');
                checkLogin();
            } else {
                loginError.innerText = 'Incorrect password';
            }
        });

        logoutBtn?.addEventListener('click', () => {
            sessionStorage.removeItem('tutor_auth');
            checkLogin();
        });

        let isCollapsed = false;
        sidebarToggle.addEventListener('click', () => {
            isCollapsed = !isCollapsed;
            sidebar.classList.toggle('collapsed', isCollapsed);
            mainContent.classList.toggle('expanded', isCollapsed);
            sidebarToggle.innerHTML = isCollapsed ? '<i class="fas fa-chevron-right"></i>' : '<i class="fas fa-chevron-left"></i>';
        });

        let allTeachers = [];
        let studentsList = [];
        let salarySettingsCache = new Map();

        async function loadAllTeachers() {
            const teacherListDiv = document.getElementById('teacherList');
            teacherListDiv.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading teachers...</div>';
            
            try {
                const teachersSnap = await getDocs(collection(db, 'teachers'));
                allTeachers = [];
                
                for (const docSnap of teachersSnap.docs) {
                    const teacher = { id: docSnap.id, ...docSnap.data() };
                    try {
                        const salaryDoc = await getDoc(doc(db, 'salarySettings', teacher.id));
                        if (salaryDoc.exists()) {
                            teacher.salaryType = salaryDoc.data().employmentType;
                            salarySettingsCache.set(teacher.id, salaryDoc.data());
                        } else {
                            teacher.salaryType = null;
                        }
                    } catch (e) {
                        teacher.salaryType = null;
                    }
                    allTeachers.push(teacher);
                }
                
                try {
                    const studentsSnap = await getDocs(collection(db, 'students'));
                    studentsList = [];
                    studentsSnap.forEach(doc => {
                        studentsList.push({ id: doc.id, ...doc.data() });
                    });
                } catch (studentError) {
                    console.warn("Error loading students:", studentError);
                    studentsList = [];
                }
                
                if (allTeachers.length === 0) {
                    teacherListDiv.innerHTML = '<div class="teacher-item">No teachers found. Please add teachers first.</div>';
                } else {
                    renderTeacherList(allTeachers);
                }
            } catch (e) {
                console.error("Error loading teachers:", e);
                teacherListDiv.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Error loading teachers. Please check Firebase connection.</div>';
            }
        }

        // Format bank account number with spaces every 4 digits
        function formatBankAccount(accountNumber) {
            if (!accountNumber) return '';
            const cleaned = accountNumber.replace(/\s/g, '');
            const groups = cleaned.match(/.{1,4}/g);
            return groups ? groups.join(' ') : accountNumber;
        }

        function getStatusBadge(salaryType) {
            if (salaryType === 'parttime') {
                return '<span class="status-badge parttime"><i class="fas fa-clock"></i> Part Time</span>';
            } else if (salaryType === 'fulltime') {
                return '<span class="status-badge fulltime"><i class="fas fa-briefcase"></i> Full Time</span>';
            } else if (salaryType === 'tuition') {
                return '<span class="status-badge tuition"><i class="fas fa-chalkboard-user"></i> Tuition</span>';
            } else {
                return '<span class="status-badge not-set"><i class="fas fa-question-circle"></i> Not Set</span>';
            }
        }

        function renderTeacherList(teachers) {
            const container = document.getElementById('teacherList');
            if (teachers.length === 0) {
                container.innerHTML = '<div class="teacher-item">No teachers found</div>';
                return;
            }
            
            container.innerHTML = '';
            teachers.forEach(teacher => {
                const subjects = teacher.subjects || [];
                const subjectNames = subjects.map(s => s.subjectName).join(', ');
                const div = document.createElement('div');
                div.className = 'teacher-item';
                
                // Display bank info with formatted account number
                let bankInfoHtml = '';
                if (teacher.bankName || teacher.bankAccount) {
                    const formattedAccount = formatBankAccount(teacher.bankAccount);
                    bankInfoHtml = `<div class="teacher-subjects" style="margin-top: 2px;">
                        <i class="fas fa-university"></i> ${escapeHtml(teacher.bankName || '')} ${formattedAccount ? ' - ' + formattedAccount : ''}
                    </div>`;
                }
                
                div.innerHTML = `
                    <div class="teacher-info">
                        <div class="teacher-name">
                            ${escapeHtml(teacher.name)}
                            ${getStatusBadge(teacher.salaryType)}
                        </div>
                        <div class="teacher-subjects">${escapeHtml(subjectNames) || 'No subjects'}</div>
                        ${bankInfoHtml}
                    </div>
                    <div class="teacher-arrow"><i class="fas fa-chevron-right"></i></div>
                `;
                div.addEventListener('click', () => showSalaryProfile(teacher.id, teacher.name));
                container.appendChild(div);
            });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Search functionality
        document.getElementById('searchBtn')?.addEventListener('click', () => {
            const searchTerm = document.getElementById('searchTeacherInput').value.toLowerCase();
            const filtered = allTeachers.filter(teacher => {
                const matchesName = teacher.name?.toLowerCase().includes(searchTerm);
                const matchesSubject = (teacher.subjects || []).some(s => s.subjectName.toLowerCase().includes(searchTerm));
                const matchesBank = teacher.bankName?.toLowerCase().includes(searchTerm) || 
                                    teacher.bankAccount?.includes(searchTerm);
                return matchesName || matchesSubject || matchesBank;
            });
            renderTeacherList(filtered);
        });

        document.getElementById('resetSearchBtn')?.addEventListener('click', () => {
            document.getElementById('searchTeacherInput').value = '';
            renderTeacherList(allTeachers);
        });

        function countStudentsForSubject(subjectName) {
            if (!studentsList || studentsList.length === 0) return 0;
            let count = 0;
            for (const student of studentsList) {
                const enrolled = student.enrolledPackages || student.enrolledSubjects || [];
                const isEnrolled = enrolled.some(e => {
                    return e.subjectName === subjectName || e.packageName === subjectName;
                });
                if (isEnrolled) count++;
            }
            return count;
        }

        // Real-time calculation functions
        function calculateParttimeSalary(hourlyRate, workPeriods, adjustment) {
            let total = 0;
            for (const period of workPeriods) {
                if (period.startDate && period.endDate && period.hours) {
                    try {
                        const start = new Date(period.startDate);
                        const end = new Date(period.endDate);
                        const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                        if (days > 0) {
                            total += days * period.hours * hourlyRate;
                        }
                    } catch(e) {}
                }
            }
            return total + adjustment;
        }

        function calculateFulltimeSalary(baseSalary, leave, useEpf, epfPercent, useSocso, socso, adjustment) {
            let total = baseSalary - leave + adjustment;
            if (useEpf) {
                total -= baseSalary * (epfPercent / 100);
            }
            if (useSocso) {
                total -= socso;
            }
            return total;
        }

        function calculateTuitionSalary(teacher, adjustment) {
            let total = 0;
            const subjects = teacher.subjects || [];
            for (const subject of subjects) {
                const fee = subject.fee || 0;
                const centerCut = subject.centerCut || 0;
                const teacherShare = fee - centerCut;
                const studentCount = countStudentsForSubject(subject.subjectName);
                total += teacherShare * studentCount;
            }
            return total + adjustment;
        }

        async function showSalaryProfile(teacherId, teacherName) {
            const teacher = allTeachers.find(t => t.id === teacherId);
            if (!teacher) return;
            
            document.getElementById('modalTeacherName').innerHTML = `<i class="fas fa-user"></i> ${escapeHtml(teacher.name)}`;
            document.getElementById('salaryModalBody').innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading salary settings...</div>';
            
            let settings = salarySettingsCache.get(teacherId) || {};
            try {
                const salaryDoc = await getDoc(doc(db, 'salarySettings', teacherId));
                if (salaryDoc.exists()) {
                    settings = salaryDoc.data();
                    salarySettingsCache.set(teacherId, settings);
                }
            } catch (e) {
                console.warn("Error loading salary settings:", e);
            }
            
            renderSalaryModal(teacher, settings);
            const modal = document.getElementById('salaryModal');
            modal.classList.add('active');
        }

        function renderSalaryModal(teacher, settings) {
            const container = document.getElementById('salaryModalBody');
            let currentEmploymentType = settings.employmentType || 'parttime';
            
            // Part time values
            let parttimeHourlyRate = settings.parttimeHourlyRate || 10;
            let parttimeWorkPeriods = settings.parttimeWorkPeriods || [{ startDate: '', endDate: '', hours: 0 }];
            let parttimeAdjustment = settings.parttimeAdjustment || 0;
            
            // Full time values
            let fulltimeBaseSalary = settings.fulltimeBaseSalary || 2000;
            let fulltimeLeave = settings.fulltimeDeductions?.leave || 0;
            let fulltimeUseEpf = settings.fulltimeDeductions?.useEpf !== undefined ? settings.fulltimeDeductions.useEpf : true;
            let fulltimeEpf = settings.fulltimeDeductions?.epf !== undefined ? settings.fulltimeDeductions.epf : 11;
            let fulltimeUseSocso = settings.fulltimeDeductions?.useSocso !== undefined ? settings.fulltimeDeductions.useSocso : false;
            let fulltimeSocso = settings.fulltimeDeductions?.socso || 0;
            let fulltimeAdjustment = settings.fulltimeAdjustment || 0;
            
            // Tuition values
            let tuitionAdjustment = settings.adjustment || 0;
            
            // Calculate initial salaries
            let parttimeSalary = calculateParttimeSalary(parttimeHourlyRate, parttimeWorkPeriods, parttimeAdjustment);
            let fulltimeSalary = calculateFulltimeSalary(fulltimeBaseSalary, fulltimeLeave, fulltimeUseEpf, fulltimeEpf, fulltimeUseSocso, fulltimeSocso, fulltimeAdjustment);
            let tuitionSalary = calculateTuitionSalary(teacher, tuitionAdjustment);
            
            let html = `
                <div class="employment-type">
                    <div class="type-btn ${currentEmploymentType === 'parttime' ? 'active' : ''}" data-type="parttime">Part Time</div>
                    <div class="type-btn ${currentEmploymentType === 'fulltime' ? 'active' : ''}" data-type="fulltime">Full Time</div>
                    <div class="type-btn ${currentEmploymentType === 'tuition' ? 'active' : ''}" data-type="tuition">Tuition</div>
                </div>
                
                <div id="parttimeSection" class="salary-section ${currentEmploymentType === 'parttime' ? 'active-section' : ''}">
                    <div class="form-group">
                        <label>Hourly Rate (RM)</label>
                        <input type="number" id="hourlyRate" value="${parttimeHourlyRate}" step="0.5">
                    </div>
                    <div id="workPeriodsContainer">
                        ${parttimeWorkPeriods.map((period, idx) => `
                            <div class="work-period" data-idx="${idx}">
                                <input type="date" placeholder="Start Date" class="period-start" value="${period.startDate || ''}">
                                <input type="date" placeholder="End Date" class="period-end" value="${period.endDate || ''}">
                                <input type="number" placeholder="Hours/Day" class="period-hours" value="${period.hours || 0}" step="0.5">
                                <button class="remove-period"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="add-period-btn" id="addPeriodBtn"><i class="fas fa-plus"></i> Add Work Period</button>
                    
                    <div class="form-group" style="margin-top: 1rem;">
                        <label>Adjustment (RM)</label>
                        <input type="number" id="parttimeAdjustment" value="${parttimeAdjustment}" step="0.5">
                        <div class="adjustment-hint">Positive = bonus, negative = deduction</div>
                    </div>
                    
                    <div class="total-salary" id="parttimeTotal">
                        <i class="fas fa-money-bill-wave"></i> Part Time Salary: <strong>RM ${parttimeSalary.toFixed(2)}</strong>
                    </div>
                </div>
                
                <div id="fulltimeSection" class="salary-section ${currentEmploymentType === 'fulltime' ? 'active-section' : ''}">
                    <div class="form-group">
                        <label>Base Salary (RM)</label>
                        <input type="number" id="baseSalary" value="${fulltimeBaseSalary}" step="50">
                    </div>
                    <div class="deduction-item">
                        <input type="checkbox" id="leaveCheck" ${fulltimeLeave !== 0 ? 'checked' : ''}>
                        <label>Leave Deduction (RM)</label>
                        <input type="number" id="leaveAmount" value="${fulltimeLeave}" step="10" style="width:120px;" ${fulltimeLeave === 0 ? 'disabled' : ''}>
                    </div>
                    <div class="deduction-item">
                        <input type="checkbox" id="epfCheck" ${fulltimeUseEpf ? 'checked' : ''}>
                        <label>EPF (%)</label>
                        <input type="number" id="epfPercent" value="${fulltimeEpf}" step="1" style="width:80px;" ${!fulltimeUseEpf ? 'disabled' : ''}> %
                    </div>
                    <div class="deduction-item">
                        <input type="checkbox" id="socsoCheck" ${fulltimeUseSocso ? 'checked' : ''}>
                        <label>SOCSO (RM)</label>
                        <input type="number" id="socsoAmount" value="${fulltimeSocso}" step="5" style="width:120px;" ${!fulltimeUseSocso ? 'disabled' : ''}>
                    </div>
                    <div class="form-group">
                        <label>Adjustment (RM)</label>
                        <input type="number" id="fulltimeAdjustment" value="${fulltimeAdjustment}" step="10">
                    </div>
                    <div class="total-salary" id="fulltimeTotal">
                        <i class="fas fa-money-bill-wave"></i> Full Time Salary: <strong>RM ${fulltimeSalary.toFixed(2)}</strong>
                    </div>
                </div>
                
                <div id="tuitionSection" class="salary-section ${currentEmploymentType === 'tuition' ? 'active-section' : ''}">
                    <div style="margin-bottom: 1rem;">
                        <label>Subject Breakdown</label>
                        ${(() => {
                            const subjects = teacher.subjects || [];
                            if (subjects.length === 0) {
                                return '<div style="color:#8ba9c0; padding:1rem; text-align:center;">No subjects assigned to this teacher</div>';
                            }
                            return subjects.map(s => {
                                const fee = s.fee || 0;
                                const centerCut = s.centerCut || 0;
                                const teacherShare = fee - centerCut;
                                const studentCount = countStudentsForSubject(s.subjectName);
                                return `
                                    <div class="subject-salary-item">
                                        <div class="subject-name">${escapeHtml(s.subjectName)}</div>
                                        <div>Fee: RM ${fee} | Center Cut: RM ${centerCut} | Teacher Share: RM ${teacherShare}</div>
                                        <div>Students: ${studentCount} | Total: RM ${(teacherShare * studentCount).toFixed(2)}</div>
                                    </div>
                                `;
                            }).join('');
                        })()}
                    </div>
                    <div class="form-group">
                        <label>Adjustment (RM)</label>
                        <input type="number" id="tuitionAdjustment" value="${tuitionAdjustment}" step="10">
                    </div>
                    <div class="total-salary" id="tuitionTotal">
                        <i class="fas fa-money-bill-wave"></i> Tuition Salary: <strong>RM ${tuitionSalary.toFixed(2)}</strong>
                    </div>
                </div>
                
                <button id="saveSalaryBtn" class="save-btn"><i class="fas fa-save"></i> Save Salary Settings</button>
                <div id="saveStatus" class="salary-updated"></div>
            `;
            
            container.innerHTML = html;
            
            // Real-time update functions
            const updateParttimeTotal = () => {
                const hourlyRate = parseFloat(document.getElementById('hourlyRate')?.value) || 0;
                const adjustment = parseFloat(document.getElementById('parttimeAdjustment')?.value) || 0;
                const periods = [];
                document.querySelectorAll('#workPeriodsContainer .work-period').forEach(period => {
                    const startDate = period.querySelector('.period-start')?.value;
                    const endDate = period.querySelector('.period-end')?.value;
                    const hours = parseFloat(period.querySelector('.period-hours')?.value) || 0;
                    if (startDate && endDate && hours > 0) {
                        periods.push({ startDate, endDate, hours });
                    }
                });
                const total = calculateParttimeSalary(hourlyRate, periods, adjustment);
                const totalDiv = document.getElementById('parttimeTotal');
                if (totalDiv) {
                    totalDiv.innerHTML = `<i class="fas fa-money-bill-wave"></i> Part Time Salary: <strong>RM ${total.toFixed(2)}</strong>`;
                }
            };
            
            const updateFulltimeTotal = () => {
                const baseSalary = parseFloat(document.getElementById('baseSalary')?.value) || 0;
                const leave = parseFloat(document.getElementById('leaveAmount')?.value) || 0;
                const useEpf = document.getElementById('epfCheck')?.checked || false;
                const epf = parseFloat(document.getElementById('epfPercent')?.value) || 11;
                const useSocso = document.getElementById('socsoCheck')?.checked || false;
                const socso = parseFloat(document.getElementById('socsoAmount')?.value) || 0;
                const adjustment = parseFloat(document.getElementById('fulltimeAdjustment')?.value) || 0;
                const total = calculateFulltimeSalary(baseSalary, leave, useEpf, epf, useSocso, socso, adjustment);
                const totalDiv = document.getElementById('fulltimeTotal');
                if (totalDiv) {
                    totalDiv.innerHTML = `<i class="fas fa-money-bill-wave"></i> Full Time Salary: <strong>RM ${total.toFixed(2)}</strong>`;
                }
            };
            
            const updateTuitionTotal = () => {
                const adjustment = parseFloat(document.getElementById('tuitionAdjustment')?.value) || 0;
                const total = calculateTuitionSalary(teacher, adjustment);
                const totalDiv = document.getElementById('tuitionTotal');
                if (totalDiv) {
                    totalDiv.innerHTML = `<i class="fas fa-money-bill-wave"></i> Tuition Salary: <strong>RM ${total.toFixed(2)}</strong>`;
                }
            };
            
            // Type switching
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const type = btn.dataset.type;
                    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.salary-section').forEach(s => s.classList.remove('active-section'));
                    document.getElementById(`${type}Section`).classList.add('active-section');
                });
            });
            
            // Part time periods
            const addPeriodBtn = document.getElementById('addPeriodBtn');
            if (addPeriodBtn) {
                addPeriodBtn.addEventListener('click', () => {
                    const periodsContainer = document.getElementById('workPeriodsContainer');
                    const newDiv = document.createElement('div');
                    newDiv.className = 'work-period';
                    newDiv.innerHTML = `
                        <input type="date" placeholder="Start Date" class="period-start">
                        <input type="date" placeholder="End Date" class="period-end">
                        <input type="number" placeholder="Hours/Day" class="period-hours" step="0.5">
                        <button class="remove-period"><i class="fas fa-trash-alt"></i></button>
                    `;
                    newDiv.querySelector('.remove-period').addEventListener('click', () => {
                        newDiv.remove();
                        updateParttimeTotal();
                    });
                    newDiv.querySelectorAll('input').forEach(input => {
                        input.addEventListener('input', () => updateParttimeTotal());
                    });
                    periodsContainer.appendChild(newDiv);
                    updateParttimeTotal();
                });
            }
            
            // Part time event listeners
            const hourlyRateInput = document.getElementById('hourlyRate');
            if (hourlyRateInput) hourlyRateInput.addEventListener('input', () => updateParttimeTotal());
            
            const parttimeAdjustmentInput = document.getElementById('parttimeAdjustment');
            if (parttimeAdjustmentInput) parttimeAdjustmentInput.addEventListener('input', () => updateParttimeTotal());
            
            document.querySelectorAll('#workPeriodsContainer .work-period').forEach(period => {
                period.querySelectorAll('input').forEach(input => {
                    input.addEventListener('input', () => updateParttimeTotal());
                });
                const removeBtn = period.querySelector('.remove-period');
                if (removeBtn) {
                    removeBtn.addEventListener('click', () => {
                        setTimeout(() => updateParttimeTotal(), 50);
                    });
                }
            });
            
            // Full time checkbox handlers
            const leaveCheck = document.getElementById('leaveCheck');
            const leaveAmount = document.getElementById('leaveAmount');
            if (leaveCheck && leaveAmount) {
                leaveCheck.addEventListener('change', (e) => {
                    leaveAmount.disabled = !e.target.checked;
                    if (!e.target.checked) leaveAmount.value = '0';
                    updateFulltimeTotal();
                });
                leaveAmount.addEventListener('input', () => updateFulltimeTotal());
            }
            
            const epfCheck = document.getElementById('epfCheck');
            const epfPercent = document.getElementById('epfPercent');
            if (epfCheck && epfPercent) {
                epfCheck.addEventListener('change', (e) => {
                    epfPercent.disabled = !e.target.checked;
                    updateFulltimeTotal();
                });
                epfPercent.addEventListener('input', () => updateFulltimeTotal());
            }
            
            const socsoCheck = document.getElementById('socsoCheck');
            const socsoAmount = document.getElementById('socsoAmount');
            if (socsoCheck && socsoAmount) {
                socsoCheck.addEventListener('change', (e) => {
                    socsoAmount.disabled = !e.target.checked;
                    if (!e.target.checked) socsoAmount.value = '0';
                    updateFulltimeTotal();
                });
                socsoAmount.addEventListener('input', () => updateFulltimeTotal());
            }
            
            // Full time other inputs
            const baseSalaryInput = document.getElementById('baseSalary');
            if (baseSalaryInput) baseSalaryInput.addEventListener('input', () => updateFulltimeTotal());
            
            const fulltimeAdjustmentInput = document.getElementById('fulltimeAdjustment');
            if (fulltimeAdjustmentInput) fulltimeAdjustmentInput.addEventListener('input', () => updateFulltimeTotal());
            
            // Tuition real-time updates
            const tuitionAdjustmentInput = document.getElementById('tuitionAdjustment');
            if (tuitionAdjustmentInput) tuitionAdjustmentInput.addEventListener('input', () => updateTuitionTotal());
            
            // Save button
            const saveBtn = document.getElementById('saveSalaryBtn');
            if (saveBtn) {
                saveBtn.addEventListener('click', async () => {
                    const selectedType = document.querySelector('.type-btn.active').dataset.type;
                    let salaryData = { employmentType: selectedType };
                    
                    if (selectedType === 'parttime') {
                        const hourlyRate = parseFloat(document.getElementById('hourlyRate').value) || 0;
                        const workPeriods = [];
                        document.querySelectorAll('#workPeriodsContainer .work-period').forEach(period => {
                            const startDate = period.querySelector('.period-start')?.value;
                            const endDate = period.querySelector('.period-end')?.value;
                            const hours = parseFloat(period.querySelector('.period-hours')?.value) || 0;
                            if (startDate && endDate && hours > 0) {
                                workPeriods.push({ startDate, endDate, hours });
                            }
                        });
                        const adjustment = parseFloat(document.getElementById('parttimeAdjustment').value) || 0;
                        salaryData.parttimeHourlyRate = hourlyRate;
                        salaryData.parttimeWorkPeriods = workPeriods;
                        salaryData.parttimeAdjustment = adjustment;
                    }
                    
                    if (selectedType === 'fulltime') {
                        const baseSalary = parseFloat(document.getElementById('baseSalary').value) || 0;
                        const leaveAmountVal = parseFloat(document.getElementById('leaveAmount').value) || 0;
                        const useEpf = document.getElementById('epfCheck').checked;
                        const epfPercentVal = parseFloat(document.getElementById('epfPercent').value) || 11;
                        const useSocso = document.getElementById('socsoCheck').checked;
                        const socsoAmountVal = parseFloat(document.getElementById('socsoAmount').value) || 0;
                        const adjustment = parseFloat(document.getElementById('fulltimeAdjustment').value) || 0;
                        salaryData.fulltimeBaseSalary = baseSalary;
                        salaryData.fulltimeDeductions = {
                            leave: leaveAmountVal,
                            useEpf: useEpf,
                            epf: epfPercentVal,
                            useSocso: useSocso,
                            socso: socsoAmountVal
                        };
                        salaryData.fulltimeAdjustment = adjustment;
                    }
                    
                    if (selectedType === 'tuition') {
                        const adjustment = parseFloat(document.getElementById('tuitionAdjustment').value) || 0;
                        salaryData.adjustment = adjustment;
                    }
                    
                    try {
                        await setDoc(doc(db, 'salarySettings', teacher.id), salaryData, { merge: true });
                        salarySettingsCache.set(teacher.id, salaryData);
                        const teacherInList = allTeachers.find(t => t.id === teacher.id);
                        if (teacherInList) {
                            teacherInList.salaryType = selectedType;
                        }
                        renderTeacherList(allTeachers);
                        const statusDiv = document.getElementById('saveStatus');
                        if (statusDiv) {
                            statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Saved successfully!';
                            setTimeout(() => { statusDiv.innerHTML = ''; }, 3000);
                        }
                    } catch (e) {
                        alert('Error saving: ' + e.message);
                    }
                });
            }
            
            updateFulltimeTotal();
        }
        
        // Modal close handlers
        document.getElementById('closeModalBtn')?.addEventListener('click', () => {
            document.getElementById('salaryModal').classList.remove('active');
        });
        document.getElementById('salaryModal')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('salaryModal')) {
                document.getElementById('salaryModal').classList.remove('active');
            }
        });

        checkLogin();
    </script>
</body>
</html>

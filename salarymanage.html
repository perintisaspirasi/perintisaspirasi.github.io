<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Salary Management | Pusat Tuisyen Perintis Aspirasi</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f7fc; color: #1a2c3e; }
        
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a5f7a 0%, #0d3b4f 100%);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .login-card {
            background: white; max-width: 420px; width: 90%; padding: 2.5rem;
            border-radius: 32px; text-align: center;
        }
        .login-card img { width: 80px; margin-bottom: 1rem; }
        .login-card input {
            width: 100%; padding: 14px 18px; border: 2px solid #e0eef5;
            border-radius: 48px; margin-bottom: 1.2rem; outline: none; font-size: 1rem;
        }
        .login-card input:focus { border-color: #2c7da0; }
        .login-card button {
            background: #2c7da0; color: white; border: none; padding: 12px 28px;
            border-radius: 48px; font-weight: 600; cursor: pointer; width: 100%;
        }
        .login-error { color: #d9534f; margin-top: 0.8rem; }
        
        .app { display: none; min-height: 100vh; }
        .sidebar {
            position: fixed; left: 0; top: 0; width: 260px; height: 100%;
            background: white; box-shadow: 2px 0 20px rgba(0,0,0,0.05);
            z-index: 1000; transition: all 0.3s ease; display: flex; flex-direction: column;
        }
        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed .sidebar-logo h2,
        .sidebar.collapsed .nav-item span,
        .sidebar.collapsed .sidebar-footer span { display: none; }
        .sidebar.collapsed .nav-item { justify-content: center; }
        .sidebar-toggle {
            position: absolute; right: -12px; top: 20px; background: #2c7da0;
            color: white; width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.7rem; z-index: 1001;
        }
        .sidebar-logo {
            padding: 1.5rem; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #e4edf2;
        }
        .sidebar-logo img { width: 40px; height: 40px; border-radius: 10px; }
        .sidebar-logo h2 { font-size: 1rem; font-weight: 600; color: #1a5f7a; }
        .nav-menu { flex: 1; padding: 1.5rem 1rem; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            margin-bottom: 8px; border-radius: 12px; color: #4a6f8a;
            cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .nav-item:hover { background: #e8f4f8; color: #2c7da0; }
        .nav-item.active { background: #2c7da0; color: white; }
        .sidebar-footer { padding: 1rem; border-top: 1px solid #e4edf2; }
        
        .main-content {
            margin-left: 260px; transition: all 0.3s ease; padding: 1.5rem 2rem;
        }
        .main-content.expanded { margin-left: 80px; }
        
        .search-section {
            background: white; border-radius: 24px; padding: 1.5rem;
            margin-bottom: 1.5rem; border: 1px solid #e4edf2;
        }
        .search-box { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .search-box input {
            flex: 1; padding: 12px 18px; border: 2px solid #e0eef5;
            border-radius: 48px; outline: none; font-size: 0.95rem;
        }
        .search-box input:focus { border-color: #2c7da0; }
        .search-btn, .reset-btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-btn {
            background: #2c7da0;
            color: white;
            border: none;
        }
        .reset-btn {
            background: #e8f4f8;
            color: #2c7da0;
            border: 1px solid #cde5ef;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            border: 1px solid #e4edf2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        .card-header {
            padding: 1.5rem 1.5rem 0 1.5rem;
        }
        .card-header h3 {
            color: #1a5f7a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-body-scroll {
            padding: 1rem 1.5rem 1.5rem 1.5rem;
            max-height: 550px;
            overflow-y: auto;
        }
        .card-body-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .card-body-scroll::-webkit-scrollbar-track {
            background: #eef3f7;
            border-radius: 10px;
        }
        .card-body-scroll::-webkit-scrollbar-thumb {
            background: #2c7da0;
            border-radius: 10px;
        }
        
        .teacher-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .teacher-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem;
            border: 1px solid #e4edf2;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        .teacher-item:hover {
            background: #f0f9ff;
            border-color: #2c7da0;
            transform: translateX(4px);
        }
        .teacher-info {
            flex: 1;
        }
        .teacher-name {
            font-weight: 700;
            font-size: 1rem;
            color: #1a5f7a;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .teacher-subjects {
            font-size: 0.75rem;
            color: #6b8ba0;
            margin-top: 4px;
        }
        .teacher-arrow {
            color: #2c7da0;
            font-size: 1.2rem;
        }
        .status-badge {
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
        }
        .status-badge.parttime { background: #fff3e0; color: #e67e22; }
        .status-badge.fulltime { background: #e0f3e8; color: #2cae6c; }
        .status-badge.tuition { background: #e8f4f8; color: #2c7da0; }
        .status-badge.not-set { background: #eef3f7; color: #8ba9c0; }
        
        .loading-spinner { text-align: center; padding: 2rem; color: #8ba9c0; }
        .error-message { text-align: center; padding: 2rem; color: #d9534f; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-container {
            background: white;
            border-radius: 32px;
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: modalSlideIn 0.3s ease;
        }
        .modal-container::-webkit-scrollbar { width: 6px; }
        .modal-container::-webkit-scrollbar-track { background: #eef3f7; border-radius: 10px; }
        .modal-container::-webkit-scrollbar-thumb { background: #2c7da0; border-radius: 10px; }
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #e4edf2;
            background: #f8fbfd;
            border-radius: 32px 32px 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .modal-header h2 {
            color: #1a5f7a;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #8ba9c0;
            transition: 0.2s;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-modal:hover {
            background: #eef3f7;
            color: #c33;
        }
        .modal-body {
            padding: 1.5rem;
        }
        
        .employment-type {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0eef5;
            border-radius: 40px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s;
        }
        .type-btn.active {
            background: #2c7da0;
            color: white;
            border-color: #2c7da0;
        }
        
        .salary-section {
            display: none;
            animation: fadeIn 0.2s ease;
        }
        .salary-section.active-section { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .form-group { margin-bottom: 1rem; }
        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #6b8ba0;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0eef5;
            border-radius: 30px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus, select:focus { border-color: #2c7da0; }
        input:disabled { background: #f5f7f9; color: #8ba9c0; }
        
        .work-period {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .work-period input { flex: 1; min-width: 100px; }
        .work-period button {
            background: #fee;
            color: #c33;
            padding: 8px 12px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
        }
        .add-period-btn {
            background: #e8f4f8;
            color: #2c7da0;
            border: 1px solid #cde5ef;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        
        .deduction-item {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .deduction-item input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        .deduction-item input[type="number"] { width: 120px; }
        
        .subject-salary-item {
            background: #f8fbfd;
            border-radius: 16px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid #2c7da0;
        }
        .subject-name { font-weight: 700; color: #1a5f7a; }
        
        .total-salary {
            background: linear-gradient(135deg, #2c7da0, #1a5f7a);
            color: white;
            padding: 1rem;
            border-radius: 20px;
            margin-top: 1.5rem;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .save-btn {
            background: #2cae6c;
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 1.5rem;
            border: none;
            cursor: pointer;
        }
        .save-btn:hover { background: #229954; transform: translateY(-1px); }
        
        .view-slip-btn {
            background: #2c7da0;
            margin-top: 0.8rem;
        }
        
        /* Salary Slip Styles */
        .salary-slip {
            background: white;
            padding: 1.5rem;
            border-radius: 24px;
        }
        .salary-slip-header {
            text-align: center;
            margin-bottom: 1.2rem;
        }
        .salary-slip-header img {
            width: 60px;
            margin-bottom: 8px;
        }
        .salary-slip-header h2 {
            color: #1a5f7a;
            font-size: 1.2rem;
        }
        .salary-slip-header p {
            font-size: 0.7rem;
            color: #6b8ba0;
        }
        .salary-slip-divider {
            border-top: 2px solid #2c7da0;
            border-bottom: 2px solid #2c7da0;
            padding: 8px 0;
            text-align: center;
            margin-bottom: 1rem;
        }
        .salary-slip-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eef3f7;
        }
        .salary-slip-total {
            background: linear-gradient(135deg, #2c7da0, #1a5f7a);
            color: white;
            padding: 12px;
            border-radius: 16px;
            margin-top: 1rem;
            text-align: center;
            font-weight: 700;
        }
        .center-fee-row {
            background: #fff3e0;
            color: #e67e22;
        }
        .slip-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .slip-actions button {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-back { background: #e8f4f8; color: #2c7da0; border: 1px solid #cde5ef; }
        .btn-download { background: #2c7da0; color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
        
        .month-selector-modal .modal-container {
            max-width: 400px;
        }
        .month-selector-modal .modal-body {
            text-align: center;
        }
        .month-selector-modal input {
            width: 100%;
            padding: 12px;
            margin: 1rem 0;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .main-content { margin-left: 80px; padding: 1rem; }
            .work-period { flex-direction: column; }
            .slip-actions { flex-direction: column; }
            .slip-actions button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <img src="icon.png" alt="Logo">
            <h3>Salary Management</h3>
            <input type="password" id="loginPassword" placeholder="Enter Password">
            <button id="loginBtn">Access Portal</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <div class="app" id="mainApp">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
            <div class="sidebar-logo"><img src="icon.png" alt="Logo"><h2>Perintis Aspirasi</h2></div>
            <div class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
                <a href="teachermanage.html" class="nav-item"><i class="fas fa-chalkboard-user"></i><span>Teacher Manage</span></a>
                <a href="studentmanage.html" class="nav-item"><i class="fas fa-user-graduate"></i><span>Student Manage</span></a>
                <a href="package.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Package Manage</span></a>
                <a href="invoice.html" class="nav-item"><i class="fas fa-file-invoice"></i><span>Invoice</span></a>
                <a href="salarymanage.html" class="nav-item active"><i class="fas fa-money-bill-wave"></i><span>Salary</span></a>
            </div>
            <div class="sidebar-footer"><div class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Log Out</span></div></div>
        </div>

        <div class="main-content" id="mainContent">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchTeacherInput" placeholder="Search by teacher name or subject...">
                    <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i> Search</button>
                    <button id="resetSearchBtn" class="reset-btn"><i class="fas fa-undo-alt"></i> Reset</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-chalkboard-user"></i> Teachers</h3>
                </div>
                <div class="card-body-scroll">
                    <div id="teacherList" class="teacher-list">
                        <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading teachers...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Salary Profile Modal -->
    <div id="salaryModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2><i class="fas fa-calculator"></i> <span id="modalTeacherName">Salary Profile</span></h2>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="salaryModalBody">
                <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
            </div>
        </div>
    </div>

    <!-- Month Selector Modal -->
    <div id="monthSelectorModal" class="modal-overlay month-selector-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h2><i class="fas fa-calendar-alt"></i> Select Salary Month</h2>
                <button class="close-modal" id="closeMonthSelectorBtn">&times;</button>
            </div>
            <div class="modal-body">
                <p>Select the month for the salary slip:</p>
                <input type="month" id="salaryMonthInput" value="">
                <div id="monthError" style="color: #e67e22; font-size: 0.8rem; margin-top: 5px;"></div>
                <button id="confirmMonthBtn" class="save-btn" style="margin-top: 1rem;">Generate Salary Slip</button>
            </div>
        </div>
    </div>

    <!-- Salary Slip Modal -->
    <div id="salarySlipModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2><i class="fas fa-receipt"></i> Salary Slip</h2>
                <button class="close-modal" id="closeSlipModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="salarySlipBody">
                <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Generating...</div>
            </div>
            <div class="slip-actions" style="padding: 0 1.5rem 1.5rem 1.5rem;">
                <button id="backToSalaryBtn" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Salary</button>
                <button id="downloadSlipBtn" class="btn-download"><i class="fas fa-download"></i> Save as PNG</button>
                <button id="whatsappSlipBtn" class="btn-whatsapp"><i class="fab fa-whatsapp"></i> Send via WhatsApp</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkfEdLDlHW7DvGxLpbDY7Us2nb3j7oTjQ",
            authDomain: "perintisaspirasi.firebaseapp.com",
            projectId: "perintisaspirasi",
            storageBucket: "perintisaspirasi.firebasestorage.app",
            messagingSenderId: "293094185092",
            appId: "1:293094185092:web:ac2b5712db54480c3ccad1",
            measurementId: "G-9ZSWKEZJVT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Auth
        const loginOverlay = document.getElementById('loginOverlay');
        const mainApp = document.getElementById('mainApp');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');

        function checkLogin() {
            if (sessionStorage.getItem('tutor_auth') === '0919') {
                loginOverlay.style.display = 'none';
                mainApp.style.display = 'block';
                loadAllTeachers();
            } else {
                loginOverlay.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        }

        loginBtn.addEventListener('click', () => {
            if (loginPassword.value === '0919') {
                sessionStorage.setItem('tutor_auth', '0919');
                checkLogin();
            } else {
                loginError.innerText = 'Incorrect password';
            }
        });

        logoutBtn?.addEventListener('click', () => {
            sessionStorage.removeItem('tutor_auth');
            checkLogin();
        });

        let isCollapsed = false;
        sidebarToggle.addEventListener('click', () => {
            isCollapsed = !isCollapsed;
            sidebar.classList.toggle('collapsed', isCollapsed);
            mainContent.classList.toggle('expanded', isCollapsed);
            sidebarToggle.innerHTML = isCollapsed ? '<i class="fas fa-chevron-right"></i>' : '<i class="fas fa-chevron-left"></i>';
        });

        let allTeachers = [];
        let studentsList = [];
        let salarySettingsCache = new Map();
        let currentSlipTeacher = null;
        let currentSlipSettings = null;
        let currentSlipMonth = null;

        async function loadAllTeachers() {
            const teacherListDiv = document.getElementById('teacherList');
            teacherListDiv.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading teachers...</div>';
            
            try {
                const teachersSnap = await getDocs(collection(db, 'teachers'));
                allTeachers = [];
                for (const docSnap of teachersSnap.docs) {
                    const teacher = { id: docSnap.id, ...docSnap.data() };
                    try {
                        const salaryDoc = await getDoc(doc(db, 'salarySettings', teacher.id));
                        if (salaryDoc.exists()) {
                            teacher.salaryType = salaryDoc.data().employmentType;
                            salarySettingsCache.set(teacher.id, salaryDoc.data());
                        } else {
                            teacher.salaryType = null;
                        }
                    } catch (e) {
                        teacher.salaryType = null;
                    }
                    allTeachers.push(teacher);

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function countStudentsForSubject(subjectName) {
            if (!studentsList || studentsList.length === 0) return 0;
            let count = 0;
            for (const student of studentsList) {
                const enrolled = student.enrolledPackages || student.enrolledSubjects || [];
                const isEnrolled = enrolled.some(e => e.subjectName === subjectName || e.packageName === subjectName);
                if (isEnrolled) count++;
            }
            return count;
        }

        function calculateCenterCutTotal(teacher) {
            let total = 0;
            const subjects = teacher.subjects || [];
            for (const subject of subjects) {
                const centerCut = subject.centerCut || 0;
                const studentCount = countStudentsForSubject(subject.subjectName);
                total += centerCut * studentCount;
            }
            return total;
        }

        function calculateParttimeSalary(hourlyRate, workPeriods, adjustment) {
            let total = 0;
            for (const period of workPeriods) {
                if (period.startDate && period.endDate && period.hours) {
                    try {
                        const start = new Date(period.startDate);
                        const end = new Date(period.endDate);
                        const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                        if (days > 0) total += days * period.hours * hourlyRate;
                    } catch(e) {}
                }
            }
            return total + adjustment;
        }

        function calculateFulltimeSalary(baseSalary, leave, useEpf, epfPercent, useSocso, socso, adjustment) {
            let total = baseSalary - leave + adjustment;
            if (useEpf) total -= baseSalary * (epfPercent / 100);
            if (useSocso) total -= socso;
            return total;
        }

        function calculateTuitionSalary(teacher, adjustment) {
            let total = 0;
            const subjects = teacher.subjects || [];
            for (const subject of subjects) {
                const fee = subject.fee || 0;
                const centerCut = subject.centerCut || 0;
                const teacherShare = fee - centerCut;
                const studentCount = countStudentsForSubject(subject.subjectName);
                total += teacherShare * studentCount;
            }
            return total + adjustment;
        }

        // 修复：允许选择入职当月的薪水单（使用 >= 而不是 >）
        function isValidMonth(selectedMonth, joinDate) {
            if (!joinDate) return true;
            const [year, month] = selectedMonth.split('-').map(Number);
            const selected = new Date(year, month - 1, 1);
            const join = new Date(joinDate);
            // 获取入职当月的第一天
            const joinMonth = new Date(join.getFullYear(), join.getMonth(), 1);
            return selected >= joinMonth;  // 允许等于（当月）
        }

            return name.replace(/[^a-zA-Z0-9]/g, '_');
        }

                            const startDate = period.querySelector('.period-start')?.value;
                            const endDate = period.querySelector('.period-end')?.value;
                            const hours = parseFloat(period.querySelector('.period-hours')?.value) || 0;
                            if (startDate && endDate && hours > 0) workPeriods.push({ startDate, endDate, hours });
                        });
                        salaryData.parttimeWorkPeriods = workPeriods;
                        salaryData.parttimeAdjustment = parseFloat(document.getElementById('parttimeAdjustment').value) || 0;
                    }
                    
                    if (selectedType === 'fulltime') {
                        salaryData.fulltimeBaseSalary = parseFloat(document.getElementById('baseSalary').value) || 0;
                        salaryData.fulltimeDeductions = {
                            leave: parseFloat(document.getElementById('leaveAmount').value) || 0,
                            useEpf: document.getElementById('epfCheck').checked,
                            epf: parseFloat(document.getElementById('epfPercent').value) || 11,
                            useSocso: document.getElementById('socsoCheck').checked,
                            socso: parseFloat(document.getElementById('socsoAmount').value) || 0
                        };
                        salaryData.fulltimeAdjustment = parseFloat(document.getElementById('fulltimeAdjustment').value) || 0;
                    }
                    
                    if (selectedType === 'tuition') {
                        salaryData.adjustment = parseFloat(document.getElementById('tuitionAdjustment').value) || 0;
                    }
                    
                    try {
                        await setDoc(doc(db, 'salarySettings', teacher.id), salaryData, { merge: true });
                        salarySettingsCache.set(teacher.id, salaryData);
                        const teacherInList = allTeachers.find(t => t.id === teacher.id);
                        if (teacherInList) teacherInList.salaryType = selectedType;
                        renderTeacherList(allTeachers);
                        const statusDiv = document.getElementById('saveStatus');
                        if (statusDiv) {
                            statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Saved!';
                            setTimeout(() => statusDiv.innerHTML = '', 2000);
                        }
                    } catch (e) { alert('Error: ' + e.message); }
                });
            }
            
            // View Salary Slip button - open month selector with validation
            const viewSlipBtn = document.getElementById('viewSalarySlipBtn');
            if (viewSlipBtn) {
                viewSlipBtn.addEventListener('click', async () => {
                    const selectedType = document.querySelector('.type-btn.active').dataset.type;
                    let latestSettings = { employmentType: selectedType };
                    
                    if (selectedType === 'parttime') {
                        latestSettings.parttimeHourlyRate = parseFloat(document.getElementById('hourlyRate').value) || 0;
                        const workPeriods = [];
                        document.querySelectorAll('#workPeriodsContainer .work-period').forEach(period => {
                            const startDate = period.querySelector('.period-start')?.value;
                            const endDate = period.querySelector('.period-end')?.value;
                            const hours = parseFloat(period.querySelector('.period-hours')?.value) || 0;
                            if (startDate && endDate && hours > 0) workPeriods.push({ startDate, endDate, hours });
                        });
                        latestSettings.parttimeWorkPeriods = workPeriods;
                        latestSettings.parttimeAdjustment = parseFloat(document.getElementById('parttimeAdjustment').value) || 0;
                    } else if (selectedType === 'fulltime') {
                        latestSettings.fulltimeBaseSalary = parseFloat(document.getElementById('baseSalary').value) || 0;
                        latestSettings.fulltimeDeductions = {
                            leave: parseFloat(document.getElementById('leaveAmount').value) || 0,
                            useEpf: document.getElementById('epfCheck').checked,
                            epf: parseFloat(document.getElementById('epfPercent').value) || 11,
                            useSocso: document.getElementById('socsoCheck').checked,
                            socso: parseFloat(document.getElementById('socsoAmount').value) || 0
                        };
                        latestSettings.fulltimeAdjustment = parseFloat(document.getElementById('fulltimeAdjustment').value) || 0;
                    } else if (selectedType === 'tuition') {
                        latestSettings.adjustment = parseFloat(document.getElementById('tuitionAdjustment').value) || 0;
                    }
                    
                    currentSlipTeacher = teacher;
                    currentSlipSettings = latestSettings;
                    
                    // Set default month to current month
                    const now = new Date();
                    const defaultMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                    document.getElementById('salaryMonthInput').value = defaultMonth;
                    document.getElementById('monthError').innerHTML = '';
                    document.getElementById('monthSelectorModal').classList.add('active');
                });
            }
            
            updateFulltimeTotal();
        }
        
        // Month selector confirmation
        document.getElementById('confirmMonthBtn')?.addEventListener('click', async () => {
            const selectedMonth = document.getElementById('salaryMonthInput').value;
            if (!selectedMonth) {
                document.getElementById('monthError').innerHTML = 'Please select a month';
                return;
            }
            
            // Validate month against join date
            if (currentSlipTeacher && currentSlipTeacher.joinDate) {
                const joinDate = currentSlipTeacher.joinDate;
                if (!isValidMonth(selectedMonth, joinDate)) {
                    const joinDateFormatted = new Date(joinDate).toLocaleDateString('en-MY');
                    document.getElementById('monthError').innerHTML = `Invalid month. This teacher joined on ${joinDateFormatted}. Only months from join date onwards are allowed.`;
                    return;
                }
            }
            
            document.getElementById('monthSelectorModal').classList.remove('active');
            
            const html = await generateSalarySlipHTML(currentSlipTeacher, currentSlipSettings, selectedMonth);
            document.getElementById('salarySlipBody').innerHTML = html;
            document.getElementById('salarySlipModal').classList.add('active');
        });
        
        // Salary Slip Modal actions
        document.getElementById('closeSlipModalBtn')?.addEventListener('click', () => {
            document.getElementById('salarySlipModal').classList.remove('active');
        });
        document.getElementById('salarySlipModal')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('salarySlipModal')) {
                document.getElementById('salarySlipModal').classList.remove('active');
            }
        });
        
        document.getElementById('closeMonthSelectorBtn')?.addEventListener('click', () => {
            document.getElementById('monthSelectorModal').classList.remove('active');
        });
        document.getElementById('monthSelectorModal')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('monthSelectorModal')) {
                document.getElementById('monthSelectorModal').classList.remove('active');
            }
        });
        
        document.getElementById('backToSalaryBtn')?.addEventListener('click', () => {
            document.getElementById('salarySlipModal').classList.remove('active');
        });
        
        document.getElementById('downloadSlipBtn')?.addEventListener('click', async () => {
            const slipElement = document.getElementById('salarySlipContent');
            if (!slipElement) return;
            try {
                const canvas = await html2canvas(slipElement, { scale: 2, backgroundColor: '#ffffff' });
                const link = document.createElement('a');
                const teacherName = currentSlipTeacher ? currentSlipTeacher.name.replace(/[^a-zA-Z0-9]/g, '_') : 'teacher';
                link.download = `slip_${teacherName}_${currentSlipMonth}.png`;
                link.href = canvas.toDataURL();
                link.click();
                alert('Salary slip downloaded!');
            } catch (err) {
                alert('Failed to download');
            }
        });
        
        document.getElementById('whatsappSlipBtn')?.addEventListener('click', async () => {
            const slipElement = document.getElementById('salarySlipContent');
            if (!slipElement) return;
            let phoneNumber = currentSlipTeacher?.phone;
            
            try {
                const canvas = await html2canvas(slipElement, { scale: 2, backgroundColor: '#ffffff' });
                const link = document.createElement('a');
                const teacherName = currentSlipTeacher ? currentSlipTeacher.name.replace(/[^a-zA-Z0-9]/g, '_') : 'teacher';
                link.download = `slip_${teacherName}_${currentSlipMonth}.png`;
                link.href = canvas.toDataURL();
                link.click();
                
                if (phoneNumber) {
                    const message = `Dear ${currentSlipTeacher?.name},\n\nPlease find attached your salary slip for ${currentSlipMonth}.\n\nThank you for your hard work!\n\nPusat Tuisyen Perintis Aspirasi`;
                    const waLink = `https://wa.me/60${phoneNumber}?text=${encodeURIComponent(message)}`;
                    window.open(waLink, '_blank');
                    alert('Salary slip downloaded. WhatsApp opened. Please attach the image.');
                } else {
                    alert('Salary slip downloaded. No phone number found for this teacher.');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
        
        // Modal close handlers
        document.getElementById('closeModalBtn')?.addEventListener('click', () => {
            document.getElementById('salaryModal').classList.remove('active');
        });
        document.getElementById('salaryModal')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('salaryModal')) {
                document.getElementById('salaryModal').classList.remove('active');
            }
        });

        checkLogin();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Invoice Management | Pusat Tuisyen Perintis Aspirasi</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f7fc; color: #1a2c3e; }
        
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a5f7a 0%, #0d3b4f 100%);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .login-card {
            background: white; max-width: 420px; width: 90%; padding: 2.5rem;
            border-radius: 32px; text-align: center;
        }
        .login-card img { width: 80px; margin-bottom: 1rem; }
        .login-card input {
            width: 100%; padding: 14px 18px; border: 2px solid #e0eef5;
            border-radius: 48px; margin-bottom: 1.2rem; outline: none; font-size: 1rem;
        }
        .login-card input:focus { border-color: #2c7da0; }
        .login-card button {
            background: #2c7da0; color: white; border: none; padding: 12px 28px;
            border-radius: 48px; font-weight: 600; cursor: pointer; width: 100%;
        }
        .login-error { color: #d9534f; margin-top: 0.8rem; }
        
        .app { display: none; min-height: 100vh; }
        .sidebar {
            position: fixed; left: 0; top: 0; width: 260px; height: 100%;
            background: white; box-shadow: 2px 0 20px rgba(0,0,0,0.05);
            z-index: 1000; transition: all 0.3s ease; display: flex; flex-direction: column;
        }
        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed .sidebar-logo h2,
        .sidebar.collapsed .nav-item span,
        .sidebar.collapsed .sidebar-footer span { display: none; }
        .sidebar.collapsed .nav-item { justify-content: center; }
        .sidebar-toggle {
            position: absolute; right: -12px; top: 20px; background: #2c7da0;
            color: white; width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.7rem; z-index: 1001;
        }
        .sidebar-logo {
            padding: 1.5rem; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #e4edf2;
        }
        .sidebar-logo img { width: 40px; height: 40px; border-radius: 10px; }
        .sidebar-logo h2 { font-size: 1rem; font-weight: 600; color: #1a5f7a; }
        .nav-menu { flex: 1; padding: 1.5rem 1rem; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            margin-bottom: 8px; border-radius: 12px; color: #4a6f8a;
            cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .nav-item:hover { background: #e8f4f8; color: #2c7da0; }
        .nav-item.active { background: #2c7da0; color: white; }
        .sidebar-footer { padding: 1rem; border-top: 1px solid #e4edf2; }
        
        .main-content {
            margin-left: 260px; transition: all 0.3s ease; padding: 1.5rem 2rem;
        }
        .main-content.expanded { margin-left: 80px; }
        
        .search-section {
            background: white; border-radius: 24px; padding: 1.5rem;
            margin-bottom: 1.5rem; border: 1px solid #e4edf2;
        }
        .search-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1a5f7a;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-box {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }
        .search-group { flex: 2; min-width: 200px; }
        .filter-group { flex: 1; min-width: 150px; }
        .button-group { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .search-section label {
            display: block; font-size: 0.7rem; font-weight: 600;
            text-transform: uppercase; color: #6b8ba0; margin-bottom: 5px;
        }
        .search-section input, .search-section select {
            width: 100%; padding: 12px 16px; border: 2px solid #e0eef5;
            border-radius: 48px; outline: none; font-size: 0.9rem;
        }
        .search-btn {
            background: #2c7da0; color: white; border: none;
            padding: 12px 28px; border-radius: 48px; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
        }
        .reset-btn {
            background: #e8f4f8; color: #2c7da0; border: 2px solid #cde5ef;
            padding: 12px 28px; border-radius: 48px; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
        }
        
        .card {
            background: white; border-radius: 24px; padding: 1.5rem;
            margin-bottom: 1.5rem; border: 1px solid #e4edf2;
        }
        .card h3 { color: #1a5f7a; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
        
        .invoice-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .invoice-card {
            background: white;
            border: 2px solid #e4edf2;
            border-radius: 20px;
            padding: 1.2rem;
            transition: all 0.2s;
            position: relative;
        }
        .invoice-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .invoice-card.paid { border-left: 5px solid #2cae6c; }
        .invoice-card.unpaid { border-left: 5px solid #e67e22; }
        .invoice-number {
            font-size: 0.7rem; font-weight: 700; padding: 4px 12px;
            border-radius: 20px; display: inline-block; margin-bottom: 12px;
        }
        .invoice-number.paid { background: #2cae6c20; color: #2cae6c; }
        .invoice-number.unpaid { background: #e67e2220; color: #e67e22; }
        .invoice-student { font-size: 1rem; font-weight: 700; color: #1a5f7a; margin-bottom: 8px; }
        .invoice-details { font-size: 0.8rem; color: #6b8ba0; margin-bottom: 8px; }
        .invoice-amount { font-size: 1.3rem; font-weight: 700; color: #1a5f7a; margin-top: 8px; }
        .package-tag { background: #e8f4f8; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin: 2px; }
        .invoice-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #eef3f7; flex-wrap: wrap; }
        .action-icon { background: none; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; }
        .action-icon.view { background: #e8f4f8; color: #2c7da0; }
        .action-icon.download { background: #e8f4f8; color: #2c7da0; }
        .action-icon.gmail { background: #ea433520; color: #ea4335; }
        .action-icon.pay { background: #2cae6c20; color: #2cae6c; }
        .action-icon.whatsapp { background: #25D36620; color: #25D366; }
        .action-icon:hover { transform: translateY(-1px); opacity: 0.9; }
        
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 1.5rem; }
        .page-btn {
            background: white; color: #2c7da0; border: 1px solid #cde5ef;
            padding: 8px 14px; border-radius: 30px; cursor: pointer;
        }
        .page-btn.active-page { background: #2c7da0; color: white; }
        
        .stats-badge { background: #e8f4f8; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; margin-left: 12px; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; border-radius: 28px; padding: 1.5rem;
            max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
        .close-modal { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999; }
        
        .final-invoice {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            position: relative;
        }
        .qr-code-container {
            position: absolute;
            bottom: 15px;
            right: 15px;
            text-align: center;
        }
        .qr-code-container .qr-label {
            font-size: 0.6rem;
            color: #6b8ba0;
            margin-top: 4px;
        }
        
        .discount-amount {
            color: #e67e22;
        }
        
        .email-modal-content {
            max-width: 500px;
        }
        .email-modal-content input, .email-modal-content textarea, .email-modal-content select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0eef5;
            border-radius: 30px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .email-modal-content textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .bulk-pay-section {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.2rem;
        }
        .pay-bulk-btn {
            background: #2cae6c;
            padding: 12px 28px;
            font-size: 0.9rem;
            border-radius: 48px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .pay-bulk-btn:hover { background: #229954; transform: translateY(-1px); }
        
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .main-content { margin-left: 80px; padding: 1rem; }
            .invoice-grid { grid-template-columns: 1fr; }
            .qr-code-container { bottom: 8px; right: 8px; }
            .qr-code-container img { width: 60px !important; height: 60px !important; }
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <img src="icon.png" alt="Logo">
            <h3>Invoice Management</h3>
            <input type="password" id="loginPassword" placeholder="Enter Password">
            <button id="loginBtn">Access Portal</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <div class="app" id="mainApp">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
            <div class="sidebar-logo"><img src="icon.png" alt="Logo"><h2>Perintis Aspirasi</h2></div>
            <div class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
                <a href="teachermanage.html" class="nav-item"><i class="fas fa-chalkboard-user"></i><span>Teacher Manage</span></a>
                <a href="studentmanage.html" class="nav-item"><i class="fas fa-user-graduate"></i><span>Student Manage</span></a>
                <a href="package.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Package Manage</span></a>
                <a href="invoice.html" class="nav-item active"><i class="fas fa-file-invoice"></i><span>Invoice</span></a>
                <a href="salarymanage.html" class="nav-item"><i class="fas fa-money-bill-wave"></i><span>Salary</span></a>
            </div>

        <div class="main-content" id="mainContent">
            <div class="search-section">
                <div class="search-title"><i class="fas fa-filter"></i> Filter Invoices</div>

        </div>
    </div>

    <!-- View Invoice Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Invoice Details</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div id="viewInvoiceContent"></div>
            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem; flex-wrap: wrap;">
                <button id="downloadFromModalBtn" class="action-icon download"><i class="fas fa-download"></i> Download PNG</button>
                <button id="shareWhatsAppBtn" class="action-icon whatsapp"><i class="fab fa-whatsapp"></i> Share via WhatsApp</button>
                <button id="gmailFromModalBtn" class="action-icon gmail"><i class="fab fa-google"></i> Send via Gmail</button>
            </div>
        </div>

    <!-- Gmail Modal -->
    <div id="gmailModal" class="modal">
        <div class="modal-content email-modal-content">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkfEdLDlHW7DvGxLpbDY7Us2nb3j7oTjQ",
            authDomain: "perintisaspirasi.firebaseapp.com",
            projectId: "perintisaspirasi",
            storageBucket: "perintisaspirasi.firebasestorage.app",
            messagingSenderId: "293094185092",
            appId: "1:293094185092:web:ac2b5712db54480c3ccad1",
            measurementId: "G-9ZSWKEZJVT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Auth
        const loginOverlay = document.getElementById('loginOverlay');
        const mainApp = document.getElementById('mainApp');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');

        function checkLogin() {
            if (sessionStorage.getItem('tutor_auth') === '0919') {
                loginOverlay.style.display = 'none';
                mainApp.style.display = 'block';
                loadAllInvoices();
            } else {
                loginOverlay.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        }

        loginBtn.addEventListener('click', () => {
            if (loginPassword.value === '0919') {
                sessionStorage.setItem('tutor_auth', '0919');
                checkLogin();
            } else {
                loginError.innerText = 'Incorrect password';
            }
        });

        logoutBtn?.addEventListener('click', () => {
            sessionStorage.removeItem('tutor_auth');
            checkLogin();
        });

        let isCollapsed = false;
        sidebarToggle.addEventListener('click', () => {
            isCollapsed = !isCollapsed;
            sidebar.classList.toggle('collapsed', isCollapsed);
            mainContent.classList.toggle('expanded', isCollapsed);
            sidebarToggle.innerHTML = isCollapsed ? '<i class="fas fa-chevron-right"></i>' : '<i class="fas fa-chevron-left"></i>';
        });

        // Data stores
        let allInvoices = [];
        let studentsCache = new Map();
        let selectedInvoices = new Set();
        
        async function loadStudentsData() {
            try {
                const studentsSnap = await getDocs(collection(db, 'students'));
                studentsSnap.forEach(doc => {
                    studentsCache.set(doc.id, {
                        name: doc.data().name,
                        phone: doc.data().phone,
                        email: doc.data().email
                    });
                });
            } catch (e) {
                console.warn("Error loading students:", e);
            }
        }
        
        function formatAmount(amount, isDiscount = false) {
            if (amount === 0) return 'RM 0.00';
            if (isDiscount && amount < 0) {
                return `-RM ${Math.abs(amount).toFixed(2)}`;
            }
            if (amount < 0) {
                return `-RM ${Math.abs(amount).toFixed(2)}`;
            }
            return `RM ${amount.toFixed(2)}`;
        }
        
        function getSubjectName(subject) {
            return subject.packageName || subject.subjectName || 'Subject';
        }
        
        function getTeacherDisplay(subject) {
            if (subject.teacherNames && Array.isArray(subject.teacherNames) && subject.teacherNames.length > 0) {
                return subject.teacherNames.join(', ');
            }
            if (subject.teacherName) {
                return subject.teacherName;
            }
            return 'Unknown';
        }
        
        // Generate QR code for e-invoice link
        function generateQRCodeForInvoice(invoiceId, containerId) {
            const eInvoiceUrl = `${window.location.origin}/einvoice.html?id=${invoiceId}`;
            const container = document.getElementById(containerId);
            if (container) {
                container.innerHTML = '';
                try {
                    new QRCode(container, {
                        text: eInvoiceUrl,
                        width: 80,
                        height: 80,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.M
                    });
                } catch(e) {
                    console.warn("QR Code error:", e);
                    container.innerHTML = '<div style="width:80px; height:80px; background:#eee; display:flex; align-items:center; justify-content:center; border-radius:8px;">QR</div>';
                }
            }
            return eInvoiceUrl;
        }
        
        async function generateInvoiceHTML(invoice) {
            const student = studentsCache.get(invoice.studentId) || { name: 'Unknown', phone: null, email: null };
            let invoiceNumberDisplay = invoice.invoiceNumber || `INV-${invoice.monthKey?.replace('-', '')}${invoice.studentId?.slice(-4)}`;
            invoiceNumberDisplay = `INV-${invoiceNumberDisplay}`;
            const today = new Date();
            const formattedDate = today.toLocaleDateString('en-MY');
            
            const subjects = invoice.subjects || [];
            let subjectsHtml = '';
            for (const sub of subjects) {
                const subjectName = getSubjectName(sub);
                const teacherDisplay = getTeacherDisplay(sub);
                subjectsHtml += `<tr><td style="padding: 8px 0;">${subjectName} (${teacherDisplay})<\/td><td style="text-align: right;">${formatAmount(sub.fee || 0)}<\/td><\/tr>`;
            }
            
            const extras = invoice.extras || { registrationFee: 0, photocopyFee: 0, discount: 0 };
            let extrasHtml = '';
            if (extras.registrationFee && extras.registrationFee !== 0) {
                extrasHtml += `<tr><td style="padding: 8px 0;">Registration Fee<\/td><td style="text-align: right;">${formatAmount(extras.registrationFee)}<\/td><\/tr>`;
            }
            if (extras.photocopyFee && extras.photocopyFee !== 0) {
                extrasHtml += `<tr><td style="padding: 8px 0;">Photocopy Fee<\/td><td style="text-align: right;">${formatAmount(extras.photocopyFee)}<\/td><\/tr>`;
            }
            if (extras.discount && extras.discount !== 0) {
                extrasHtml += `<tr><td style="padding: 8px 0;">Discount / Adjustment<\/td><td style="text-align: right; color: #e67e22;">${formatAmount(extras.discount, true)}<\/td><\/tr>`;
            }
            
            // Generate unique ID for QR code container
            const qrContainerId = `qr_${invoice.id}_${Date.now()}`;
            
            return `
                <div class="final-invoice" id="invoiceToSend" style="position: relative; min-height: 400px;">
                    <div style="text-align: center; margin-bottom: 1rem;">
                        <img src="icon.png" alt="Logo" style="width: 60px; margin-bottom: 8px;" onerror="this.style.display='none'">
                        <h2 style="color: #1a5f7a; margin: 0;">Pusat Tuisyen Perintis Aspirasi</h2>
                        <p style="font-size: 0.7rem; color: #6b8ba0; margin: 4px 0;">No. 21, Lorong 1, Taman Perlis, Kangar, Malaysia</p>
                        <p style="font-size: 0.7rem; color: #6b8ba0;">TEL/FAX: 012-520 0919 | RA 095223949</p>
                    </div>
                    <div style="border-top: 2px solid #2c7da0; border-bottom: 2px solid #2c7da0; padding: 8px 0; text-align: center;">
                        <h3 style="margin: 0;">INVOICE</h3>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin: 1rem 0;">
                        <div><strong>Invoice No:</strong> ${invoiceNumberDisplay}</div>
                        <div><strong>Date:</strong> ${formattedDate}</div>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <div><strong>Student:</strong> ${student.name}</div>
                        <div><strong>Month:</strong> ${invoice.monthKey || 'N/A'}</div>
                        ${student.email ? `<div><strong>Email:</strong> ${student.email}</div>` : ''}
                        ${student.phone ? `<div><strong>Phone:</strong> +60 ${student.phone}</div>` : ''}
                    </div>
                    <div class="payment-status" style="margin-bottom: 1rem; padding: 8px; background: ${invoice.paid ? '#e0f3e8' : '#fff3e0'}; border-radius: 8px; text-align: center;">
                        <strong>Status:</strong> ${invoice.paid ? '✓ PAID' : '○ UNPAID'}
                    </div>
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead><tr style="border-bottom: 1px solid #cde5ef;"><th style="text-align: left; padding: 8px 0;">Description</th><th style="text-align: right; padding: 8px 0;">Amount (RM)</th><\/tr></thead>
                        <tbody>${subjectsHtml}${extrasHtml}<tr style="border-top: 2px solid #2c7da0; font-weight: 700;"><td style="padding: 12px 0;">TOTAL<\/td><td style="text-align: right;">${formatAmount(invoice.totalAmount || 0)}<\/td><\/tr></tbody>
                    </table>
                    <div style="text-align: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #cde5ef; font-size: 0.7rem; color: #8ba9c0;">
                        This is an electronically generated invoice.<br>PerintisAspirasi123@gmail.com
                    </div>
                    <div class="qr-code-container" id="${qrContainerId}">
                        <div class="qr-label">Scan to view e-Invoice</div>
                    </div>
                </div>
            `;
        }
        
        async function loadAllInvoices() {
            try {
                await loadStudentsData();
                
                const invoicesSnap = await getDocs(collection(db, 'invoices'));
                allInvoices = [];
                for (const invDoc of invoicesSnap.docs) {
                    const inv = { id: invDoc.id, ...invDoc.data() };
                    const student = studentsCache.get(inv.studentId);
                    inv.studentName = student?.name || 'Unknown';
                    inv.studentEmail = student?.email || null;
                    inv.studentPhone = student?.phone || null;
                    allInvoices.push(inv);
                }
                allInvoices.sort((a, b) => (b.monthKey || '').localeCompare(a.monthKey || ''));
                
                const unpaidCount = allInvoices.filter(i => !i.paid).length;
                const paidCount = allInvoices.filter(i => i.paid).length;
                document.getElementById('invoiceStats').innerHTML = `${paidCount} Paid / ${unpaidCount} Unpaid`;
                
                applyFiltersAndRender();
            } catch (e) {
                console.warn("Error loading invoices:", e);
                document.getElementById('invoiceGrid').innerHTML = '<div class="no-results">Error loading invoices.</div>';
            }
        }
        
        let currentFilters = { search: '', status: 'all' };
        let currentPage = 1;
        let rowsPerPage = 9;
        
        function applyFiltersAndRender() {
            let filtered = [...allInvoices];
            if (currentFilters.search) {
                const searchLower = currentFilters.search.toLowerCase();
                filtered = filtered.filter(inv => inv.studentName?.toLowerCase().includes(searchLower) ||
                    (inv.subjects || []).some(s => {
                        const subjectName = s.packageName || s.subjectName || '';
                        return subjectName.toLowerCase().includes(searchLower);
                    }));
            }
            if (currentFilters.status === 'paid') filtered = filtered.filter(inv => inv.paid === true);
            else if (currentFilters.status === 'unpaid') filtered = filtered.filter(inv => inv.paid !== true);
            
            const totalPages = Math.ceil(filtered.length / rowsPerPage);
            const start = (currentPage - 1) * rowsPerPage;
            const paginated = filtered.slice(start, start + rowsPerPage);
            renderInvoiceGrid(paginated);
            renderPagination(totalPages);
            
            const unpaidInView = filtered.filter(inv => !inv.paid).length;
            const bulkSection = document.getElementById('bulkPaySection');
            bulkSection.style.display = unpaidInView > 0 ? 'flex' : 'none';
        }
        
        function sendWhatsAppReminder(phoneNumber, studentName, monthKey, amount) {
            if (!phoneNumber) {
                alert(`No phone number found for ${studentName}. Please add phone number in Student Management.`);
                return;
            }
            const message = `Dear ${studentName},\n\nThis is a friendly reminder that your tuition fee for ${monthKey} of RM ${amount.toFixed(2)} is still unpaid.\n\nPlease make the payment at your earliest convenience.\n\nThank you for your cooperation!\n\nPusat Tuisyen Perintis Aspirasi`;
            const waLink = `https://wa.me/60${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(waLink, '_blank');
        }
        
        function renderInvoiceGrid(invoices) {
            const grid = document.getElementById('invoiceGrid');
            if (invoices.length === 0) {
                grid.innerHTML = '<div class="no-results"><i class="fas fa-inbox"></i> No invoices found</div>';
                return;
            }
            grid.innerHTML = '';
            invoices.forEach(inv => {
                const isPaid = inv.paid === true;
                const isSelected = selectedInvoices.has(inv.id);
                let invNumberDisplay = inv.invoiceNumber ? `INV-${inv.invoiceNumber}` : `INV-${inv.monthKey?.replace('-', '')}${inv.studentId?.slice(-4)}`;
                const subjects = inv.subjects || [];
                const packagesHtml = subjects.map(s => {
                    const subjectName = s.packageName || s.subjectName || 'Subject';
                    return `<span class="package-tag">${subjectName} (RM${s.fee})</span>`;
                }).join('');
                
                const card = document.createElement('div');
                card.className = `invoice-card ${isPaid ? 'paid' : 'unpaid'} ${isSelected ? 'selected' : ''}`;
                card.innerHTML = `
                    ${!isPaid ? `<input type="checkbox" class="invoice-checkbox" data-id="${inv.id}" style="position:absolute; top:12px; right:12px; width:18px; height:18px; cursor:pointer;" ${isSelected ? 'checked' : ''}>` : ''}
                    <div class="invoice-number ${isPaid ? 'paid' : 'unpaid'}"><i class="fas ${isPaid ? 'fa-check-circle' : 'fa-clock'}"></i> ${invNumberDisplay}</div>
                    <div class="invoice-student"><i class="fas fa-user-graduate"></i> ${inv.studentName}</div>
                    <div class="invoice-details"><i class="fas fa-calendar-alt"></i> ${inv.monthKey || 'N/A'}</div>
                    <div class="invoice-details">${packagesHtml || '<span class="package-tag">No subjects</span>'}</div>
                    <div class="invoice-amount">RM ${(inv.totalAmount || 0).toFixed(2)}</div>
                    <div class="invoice-actions">
                        <button class="action-icon view" data-id="${inv.id}"><i class="fas fa-eye"></i> View</button>
                        ${!isPaid ? `
                            <button class="action-icon pay" data-id="${inv.id}"><i class="fas fa-credit-card"></i> Pay Now</button>
                            <button class="action-icon whatsapp" data-id="${inv.id}" data-phone="${inv.studentPhone || ''}" data-name="${inv.studentName}" data-month="${inv.monthKey}" data-amount="${inv.totalAmount}"><i class="fab fa-whatsapp"></i> Reminder</button>
                        ` : `
                            <button class="action-icon download" data-id="${inv.id}"><i class="fas fa-download"></i> Download</button>
                            <button class="action-icon gmail" data-id="${inv.id}" data-email="${inv.studentEmail || ''}" data-name="${inv.studentName}"><i class="fab fa-google"></i> Gmail</button>
                        `}
                    </div>
                `;
                grid.appendChild(card);
                
                if (!isPaid) {
                    const checkbox = card.querySelector('.invoice-checkbox');
                    if (checkbox) {
                        checkbox.addEventListener('change', (e) => {
                            e.stopPropagation();
                            if (checkbox.checked) selectedInvoices.add(inv.id);
                            else selectedInvoices.delete(inv.id);
                            document.getElementById('selectedCount').innerText = selectedInvoices.size;
                        });
                    }
                    const payBtn = card.querySelector('.pay');
                    if (payBtn) {
                        payBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            sessionStorage.setItem('selectedInvoices', JSON.stringify([inv.id]));
                            window.location.href = 'payment.html';
                        });
                    }
                    const waBtn = card.querySelector('.whatsapp');
                    if (waBtn) {
                        waBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            sendWhatsAppReminder(waBtn.dataset.phone, waBtn.dataset.name, waBtn.dataset.month, parseFloat(waBtn.dataset.amount));
                        });
                    }
                }
            });
            
            document.querySelectorAll('.view').forEach(btn => btn.addEventListener('click', () => openViewModal(btn.dataset.id)));
            document.querySelectorAll('.download').forEach(btn => btn.addEventListener('click', () => downloadInvoice(btn.dataset.id)));
            document.querySelectorAll('.gmail').forEach(btn => btn.addEventListener('click', () => openGmailModal(btn.dataset.id, btn.dataset.email, btn.dataset.name)));
            
            document.getElementById('selectedCount').innerText = selectedInvoices.size;
        }
        
        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</button>`;
            }
            container.innerHTML = html;
            document.querySelectorAll('.page-btn').forEach(btn => btn.addEventListener('click', () => {
                currentPage = parseInt(btn.dataset.page);
                applyFiltersAndRender();
            }));
        }
        
        let currentViewInvoiceId = null;
        
        async function openViewModal(invoiceId) {
            currentViewInvoiceId = invoiceId;
            const invoice = allInvoices.find(i => i.id === invoiceId);
            if (invoice) {
                const html = await generateInvoiceHTML(invoice);
                document.getElementById('viewInvoiceContent').innerHTML = html;
                document.getElementById('viewModal').style.display = 'flex';
                
                // Generate QR code after modal is shown
                setTimeout(() => {
                    const qrContainer = document.querySelector('#viewInvoiceContent .qr-code-container');
                    if (qrContainer) {
                        generateQRCodeForInvoice(invoice.id, qrContainer.id);
                    }
                }, 100);
            }
        }
        
        async function downloadInvoice(invoiceId) {
            const invoice = allInvoices.find(i => i.id === invoiceId);
            if (!invoice) return;
            const html = await generateInvoiceHTML(invoice);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            tempDiv.style.top = '-9999px';
            document.body.appendChild(tempDiv);
            
            // Generate QR code in temp div
            const qrContainer = tempDiv.querySelector('.qr-code-container');
            if (qrContainer) {
                generateQRCodeForInvoice(invoice.id, qrContainer.id);
                await new Promise(resolve => setTimeout(resolve, 200));
            }
            
            try {
                const canvas = await html2canvas(tempDiv.querySelector('.final-invoice'), { scale: 3, backgroundColor: '#ffffff', logging: false });
                const link = document.createElement('a');
                link.download = `invoice_${invoice.studentName}_${invoice.monthKey}.png`;
                link.href = canvas.toDataURL();
                link.click();
                alert('Invoice downloaded successfully!');
            } catch (err) {
                console.error('Download error:', err);
                alert('Failed to download invoice');
            }
            document.body.removeChild(tempDiv);
        }
        
        // WhatsApp share function for paid invoices
        async function shareViaWhatsApp(invoiceId) {
            const invoice = allInvoices.find(i => i.id === invoiceId);
            if (!invoice) return;
            const studentPhone = invoice.studentPhone;
            if (!studentPhone) {
                alert('No phone number found for this student.');
                return;
            }
            
            const html = await generateInvoiceHTML(invoice);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            tempDiv.style.top = '-9999px';
            document.body.appendChild(tempDiv);
            
            const qrContainer = tempDiv.querySelector('.qr-code-container');
            if (qrContainer) {
                generateQRCodeForInvoice(invoice.id, qrContainer.id);
                await new Promise(resolve => setTimeout(resolve, 200));
            }
            
            try {
                const canvas = await html2canvas(tempDiv.querySelector('.final-invoice'), { scale: 2, backgroundColor: '#ffffff', logging: false });
                const link = document.createElement('a');
                const filename = `invoice_${invoice.studentName}_${invoice.monthKey}.png`;
                link.download = filename;
                link.href = canvas.toDataURL();
                link.click();
                
                const message = `Dear ${invoice.studentName},\n\nPlease find attached your invoice for ${invoice.monthKey}.\n\nTotal Amount: ${formatAmount(invoice.totalAmount || 0)}\n\nThank you!`;
                const waLink = `https://wa.me/60${studentPhone}?text=${encodeURIComponent(message)}`;
                window.open(waLink, '_blank');
                alert('Invoice downloaded. WhatsApp opened. Please attach the image.');
            } catch (err) {
                alert('Error: ' + err.message);
            }
            document.body.removeChild(tempDiv);
        }
        
        let currentGmailInvoiceId = null;
        
        function openGmailModal(invoiceId, studentEmail, studentName) {
            currentGmailInvoiceId = invoiceId;
            const invoice = allInvoices.find(i => i.id === invoiceId);
            if (!invoice) return;
            
            document.getElementById('gmailTo').value = studentEmail || '';
            document.getElementById('gmailSubject').value = `Invoice from Pusat Tuisyen Perintis Aspirasi - ${studentName} (${invoice.monthKey})`;
            document.getElementById('gmailBody').value = `Dear ${studentName},\n\nPlease find attached your invoice for ${invoice.monthKey}.\n\nTotal Amount: ${formatAmount(invoice.totalAmount || 0)}\n\nThank you for your continued support!\n\nBest regards,\nPusat Tuisyen Perintis Aspirasi`;
            document.getElementById('gmailModal').style.display = 'flex';
        }
        
        document.getElementById('openGmailBtn')?.addEventListener('click', async () => {
            const to = document.getElementById('gmailTo').value.trim();
            const subject = document.getElementById('gmailSubject').value;
            const body = document.getElementById('gmailBody').value;
            
            if (!to) {
                alert('Please enter recipient email address');
                return;
            }
            
            const invoice = allInvoices.find(i => i.id === currentGmailInvoiceId);
            if (!invoice) return;
            
            const btn = document.getElementById('openGmailBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Preparing...';
            btn.disabled = true;
            
            try {
                const html = await generateInvoiceHTML(invoice);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                tempDiv.style.position = 'absolute';
                tempDiv.style.left = '-9999px';
                tempDiv.style.top = '-9999px';
                document.body.appendChild(tempDiv);
                
                const qrContainer = tempDiv.querySelector('.qr-code-container');
                if (qrContainer) {
                    generateQRCodeForInvoice(invoice.id, qrContainer.id);
                    await new Promise(resolve => setTimeout(resolve, 200));
                }
                
                const canvas = await html2canvas(tempDiv.querySelector('.final-invoice'), { scale: 3, backgroundColor: '#ffffff', logging: false });
                document.body.removeChild(tempDiv);
                
                const link = document.createElement('a');
                const filename = `invoice_${invoice.studentName}_${invoice.monthKey}.png`;
                link.download = filename;
                link.href = canvas.toDataURL();
                link.click();
                
                const gmailComposeUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(to)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body + '\n\n---\nInvoice attached: ' + filename)}`;
                window.open(gmailComposeUrl, '_blank');
                
                alert(`Invoice downloaded. Please attach the file to your Gmail message.`);
                
                document.getElementById('gmailModal').style.display = 'none';
                document.getElementById('gmailTo').value = '';
                
            } catch (err) {
                console.error('Gmail error:', err);
                alert('Error preparing invoice. Please try again.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
        
        document.getElementById('downloadFromModalBtn')?.addEventListener('click', async () => {
            if (currentViewInvoiceId) await downloadInvoice(currentViewInvoiceId);
        });
        
        document.getElementById('shareWhatsAppBtn')?.addEventListener('click', async () => {
            if (currentViewInvoiceId) {
                await shareViaWhatsApp(currentViewInvoiceId);
            }
        });
        
        document.getElementById('gmailFromModalBtn')?.addEventListener('click', async () => {
            if (currentViewInvoiceId) {
                const invoice = allInvoices.find(i => i.id === currentViewInvoiceId);
                if (invoice) {
                    openGmailModal(currentViewInvoiceId, invoice.studentEmail, invoice.studentName);
                }
            }
        });
        
        document.getElementById('bulkPayBtn')?.addEventListener('click', () => {
            const selectedIds = Array.from(selectedInvoices);
            if (selectedIds.length === 0) {
                alert('Please select at least one invoice to pay');
                return;
            }
            sessionStorage.setItem('selectedInvoices', JSON.stringify(selectedIds));
            window.location.href = 'payment.html';
        });
        
        document.getElementById('searchBtn')?.addEventListener('click', () => {
            currentFilters.search = document.getElementById('searchInvoiceInput').value;
            currentFilters.status = document.getElementById('statusFilter').value;
            currentPage = 1;
            selectedInvoices.clear();
            applyFiltersAndRender();
        });
        
        document.getElementById('resetSearchBtn')?.addEventListener('click', () => {
            document.getElementById('searchInvoiceInput').value = '';
            document.getElementById('statusFilter').value = 'all';
            currentFilters = { search: '', status: 'all' };
            currentPage = 1;
            selectedInvoices.clear();
            applyFiltersAndRender();
        });
        
        document.querySelectorAll('.close-modal, .close-gmail-modal').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('viewModal').style.display = 'none';
                document.getElementById('gmailModal').style.display = 'none';
            });
        });
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('viewModal')) document.getElementById('viewModal').style.display = 'none';
            if (e.target === document.getElementById('gmailModal')) document.getElementById('gmailModal').style.display = 'none';
        });
        
        checkLogin();
    </script>
</body>
</html>
